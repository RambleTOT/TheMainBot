# nginx: проксирует админку (127.0.0.1:8000) на домен по HTTPS.
# HTTPS-сертификат добавит certbot автоматически (см. deploy.sh).
# Файл кладётся в /etc/nginx/sites-available/themain и линкуется в sites-enabled.

server {
    listen 80;
    server_name themainpsychology.ru www.themainpsychology.ru;

    # certbot заменит/дополнит этот блок TLS-настройками (443).

    # Админка: https://themainpsychology.ru/admin
    location /admin {
        # --- Рекомендуется ограничить доступ к админке по IP ---
        # Раскомментируйте и укажите свой IP, остальным — 403:
        # allow 203.0.113.10;   # ваш офис/дом
        # deny all;

        proxy_pass http://127.0.0.1:8000;   # без завершающего слэша: префикс /admin сохраняется
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Корень домена пока не используется (бот работает в Telegram).
    # Позже здесь может быть лендинг. Сейчас — редирект на админку.
    location = / {
        return 302 /admin;
    }

    # Место для будущего вебхука ЮKassa (Этап 2):
    # location /yookassa { proxy_pass http://127.0.0.1:8080; ... }

    client_max_body_size 5m;
}
