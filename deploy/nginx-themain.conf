# nginx: лендинг на корне домена, статические шрифты, проксирование админки,
# заголовки безопасности. Кладётся в /etc/nginx/sites-available/themain.
# После замены запустите:  certbot --nginx -d themainpsychology.ru -d www.themainpsychology.ru --redirect
# (certbot добавит блок HTTPS/443 и редирект с http; заголовки/локации сохранятся).

server {
    listen 80;
    server_name themainpsychology.ru www.themainpsychology.ru;

    server_tokens off;   # не раскрываем версию nginx

    # ---- заголовки безопасности ----
    add_header X-Frame-Options "DENY" always;                     # запрет встраивания в iframe
    add_header X-Content-Type-Options "nosniff" always;            # запрет MIME-sniffing
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000" always;  # HSTS (действует после HTTPS)

    root /opt/themain/web;

    # ---- лендинг The MAIN на корне ----
    location = / { try_files /index.html =404; }

    # ---- самостоятельно захостенные шрифты ----
    # (без add_header — иначе location перестаёт наследовать заголовки безопасности;
    #  expires сам ставит Cache-Control)
    location /fonts/ {
        expires 30d; access_log off;
        try_files $uri =404;
    }

    # ---- админка ----
    # Защита от подбора пароля — на уровне приложения (пер-IP лимит + блокировка).
    # Доп. слой (по желанию): ограничить по IP ниже, либо nginx limit_req.
    location /admin {
        # Рекомендуется ограничить доступ по IP (раскомментируйте и укажите свой):
        # allow 203.0.113.10;
        # deny all;
        proxy_pass http://127.0.0.1:8000;   # без завершающего слэша: префикс /admin сохраняется
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Место для будущего вебхука ЮKassa (Этап 2):
    # location /yookassa { proxy_pass http://127.0.0.1:8080; ... }

    client_max_body_size 5m;
}
