<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — THE MAIN</title>
  <style>
    body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
           background:#0f1720; color:#e7edf3; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    .box { background:#182430; border:1px solid #26333f; border-radius:14px; padding:28px; width:320px; }
    .box h1 { font-size:19px; margin:0 0 18px; }
    input { width:100%; background:#0f1a24; color:#e7edf3; border:1px solid #26333f;
            border-radius:8px; padding:10px; font:inherit; margin-bottom:12px; }
    button { width:100%; background:#3a8fd0; color:#fff; border:none; border-radius:8px;
             padding:10px; font:inherit; cursor:pointer; }
    .err { color:#e5634d; font-size:13px; margin-bottom:12px; }
    .muted { color:#93a4b3; font-size:13px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🐘 THE MAIN — админка</h1>
    {% if no_password %}
      <p class="err">ADMIN_PASSWORD не задан в .env — вход невозможен.</p>
    {% endif %}
    {% if error %}<p class="err">Неверный пароль.</p>{% endif %}
    <form method="post" action="{{ base }}/login">
      <input type="password" name="password" placeholder="Пароль" autofocus>
      <button type="submit">Войти</button>
    </form>
  </div>
</body>
</html>
